# CI pipeline — runs on every push and pull request.
#
# Jobs:
#   typecheck — tsc --noEmit with strict + noUncheckedIndexedAccess
#   lint      — eslint, max-warnings=0
#   test      — jest unit tests (money domain)
#
# If any job fails, the merge is blocked. This enforces the convention in the
# README: "Before shipping a PR, run typecheck + lint."

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

defaults:
  run:
    working-directory: app

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: tsc --noEmit
        run: npm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: ESLint
        run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Jest
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":70}}'
