name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

defaults:
  run:
    working-directory: app

jobs:
  deploy:
    name: Build and deploy GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Export Expo web app
        run: npx expo export --platform web
        env:
          EXPO_BASE_URL: /PayPaddy

      - name: Prepare GitHub Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          perl -0pi -e 's#<body>#<body><script>window.process=window.process||{};window.process.env=Object.assign({},window.process.env,{EXPO_BASE_URL:"/PayPaddy"});</script># unless /EXPO_BASE_URL:"\/PayPaddy"/' dist/index.html
          perl -0pi -e 's/src="\/_expo\//src="\/PayPaddy\/_expo\//g' dist/index.html
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: app/dist
          keep_files: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
