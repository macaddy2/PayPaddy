<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PayPaddy</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Manrope',-apple-system,sans-serif;background:#F5F1EA;color:#0A1F1A;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit}

/* ============ LAYOUT SHELL ============ */
.app{display:grid;grid-template-columns:1fr;grid-template-rows:1fr;height:100vh;position:relative}

/* Sidebar (desktop+) */
.sidebar{display:none;background:#0A1F1A;color:#FAF7F2;padding:24px 16px;flex-direction:column;gap:4px;overflow-y:auto}
.logo{display:flex;align-items:center;gap:10px;padding:4px 8px 24px}
.logo-mark{width:32px;height:32px;background:#BFFF4F;border-radius:9px;transform:rotate(-8deg);display:grid;place-items:center;font-size:16px;flex-shrink:0}
.logo-text{font-weight:900;letter-spacing:-.6px;font-size:18px}
.nav-section{font-size:10px;font-weight:800;letter-spacing:.8px;color:#8B8680;padding:16px 10px 6px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:600;color:rgba(250,247,242,.75);cursor:pointer;transition:all .15s;text-align:left;width:100%;justify-content:flex-start}
.nav-item:hover{background:rgba(255,255,255,.04);color:#FAF7F2}
.nav-item.active{background:rgba(191,255,79,.1);color:#BFFF4F}
.nav-item .ic{font-size:16px;width:20px;display:inline-grid;place-items:center}
.nav-item .badge{margin-left:auto;background:#FF6B4A;color:#fff;font-size:10px;font-weight:800;padding:1px 6px;border-radius:999px;min-width:18px;text-align:center}
.sidebar-foot{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;padding:12px 10px}
.avatar{width:32px;height:32px;border-radius:50%;background:#FF9D6E;color:#0A1F1A;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0}

/* Main area */
.main{overflow-y:auto;position:relative;background:#F5F1EA;height:100vh}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:rgba(10,31,26,.15);border-radius:4px}

/* Mobile bottom nav */
.mobile-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #F0EBE1;display:flex;justify-content:space-around;padding:10px 8px 14px;z-index:50}
.mobile-nav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 8px;color:#8B8680;font-size:10px;font-weight:600;position:relative}
.mobile-nav button.active{color:#00A86B;font-weight:800}
.mobile-nav .ic{font-size:20px}
.mobile-nav .badge{position:absolute;top:-4px;right:4px;width:16px;height:16px;background:#FF6B4A;color:#fff;border-radius:50%;font-size:9px;font-weight:800;display:grid;place-items:center}

/* Top bar (mobile) */
.mobile-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#0A1F1A;color:#FAF7F2;position:sticky;top:0;z-index:10}

/* ============ RESPONSIVE ============ */
@media (min-width: 900px){
  .app{grid-template-columns:240px 1fr}
  .sidebar{display:flex}
  .mobile-nav,.mobile-topbar{display:none}
}
@media (min-width: 1200px){
  .app{grid-template-columns:260px 1fr}
}

/* ============ CONTENT WRAPPERS ============ */
.content{max-width:1100px;margin:0 auto;padding:24px 20px 100px}
@media (min-width: 900px){ .content{padding:32px 40px 40px} }
@media (min-width: 1200px){ .content{padding:40px 56px} }

.page-head{margin-bottom:24px}
.page-eye{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:#8B8680;margin-bottom:6px}
.page-title{font-size:28px;font-weight:900;letter-spacing:-.8px;line-height:1.1}
@media (min-width: 900px){ .page-title{font-size:36px;letter-spacing:-1.2px} }
.page-sub{font-size:14px;color:#8B8680;margin-top:6px}

/* Card primitive */
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 1px 3px rgba(10,31,26,.04)}

/* Buttons */
.btn{padding:12px 20px;border-radius:12px;font-size:14px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.btn-primary{background:#00A86B;color:#fff}
.btn-primary:hover{background:#00925d;transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,168,107,.3)}
.btn-dark{background:#0A1F1A;color:#FAF7F2}
.btn-dark:hover{background:#14453D;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:#0A1F1A;border:1.5px solid #E6DFD2}
.btn-ghost:hover{background:#fff;border-color:#0A1F1A}
.btn-lg{padding:16px 28px;font-size:15px;border-radius:14px}
.btn-block{width:100%}

/* Status pills */
.pill{padding:4px 10px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.3px;display:inline-flex;align-items:center;gap:4px}
.pill-emerald{background:rgba(0,168,107,.12);color:#00A86B}
.pill-apricot{background:rgba(255,157,110,.18);color:#B55A2E}
.pill-coral{background:rgba(255,107,74,.15);color:#C7472B}
.pill-info{background:rgba(61,127,255,.12);color:#3D7FFF}

.tabular{font-variant-numeric:tabular-nums}
.eye{font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:#8B8680}

/* Splash screen (takes over full area) */
.splash-takeover{position:fixed;inset:0;background:#14453D;z-index:100;display:flex;flex-direction:column;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="web/shell.jsx"></script>
<script type="text/babel" src="web/screens.jsx"></script>
<script type="text/babel" src="web/screens2.jsx"></script>
<script type="text/babel" src="web/app.jsx"></script>
</body>
</html>
