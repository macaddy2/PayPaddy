<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
body{width:700px;background:#FAF7F2;padding:20px;color:#0A1F1A}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.sw{height:96px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;position:relative}
.sw .n{font-size:11px;font-weight:800;letter-spacing:0.3px}
.sw .h{font-size:10px;font-weight:600;opacity:.75;font-family:'JetBrains Mono',monospace}
.sw.ink{background:#0A1F1A;color:#FAF7F2}
.sw.forest{background:#14453D;color:#FAF7F2}
.sw.emerald{background:#00A86B;color:#fff}
.sw.lime{background:#BFFF4F;color:#0A1F1A}
.sw.apricot{background:#FF9D6E;color:#0A1F1A}
.sw.coral{background:#FF6B4A;color:#fff}
.sw.alert{background:#E94B3C;color:#fff}
.sw.caution{background:#F5A623;color:#0A1F1A}
.sw.cream{background:#FAF7F2;color:#0A1F1A;border:1.5px solid #F0EBE1}
.sw.sand{background:#F0EBE1;color:#0A1F1A}
.sw.stone{background:#8B8680;color:#fff}
.sw.charcoal{background:#1C1C1C;color:#fff}
</style></head><body>
  <div class="row">
    <div class="sw ink"><div class="n">Ink</div><div class="h">#0A1F1A</div></div>
    <div class="sw forest"><div class="n">Forest</div><div class="h">#14453D</div></div>
    <div class="sw emerald"><div class="n">Emerald</div><div class="h">#00A86B</div></div>
    <div class="sw lime"><div class="n">Lime</div><div class="h">#BFFF4F</div></div>
  </div>
  <div class="row">
    <div class="sw apricot"><div class="n">Apricot</div><div class="h">#FF9D6E</div></div>
    <div class="sw coral"><div class="n">Coral</div><div class="h">#FF6B4A</div></div>
    <div class="sw alert"><div class="n">Alert</div><div class="h">#E94B3C</div></div>
    <div class="sw caution"><div class="n">Caution</div><div class="h">#F5A623</div></div>
  </div>
  <div class="row">
    <div class="sw cream"><div class="n">Cream</div><div class="h">#FAF7F2</div></div>
    <div class="sw sand"><div class="n">Sand</div><div class="h">#F0EBE1</div></div>
    <div class="sw stone"><div class="n">Stone</div><div class="h">#8B8680</div></div>
    <div class="sw charcoal"><div class="n">Charcoal</div><div class="h">#1C1C1C</div></div>
  </div>
</body></html>
