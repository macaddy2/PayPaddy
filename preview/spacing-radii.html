<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
body{width:700px;background:#FAF7F2;padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:12px;align-items:end}
.r{display:flex;flex-direction:column;align-items:center;gap:6px}
.swatch{width:100%;background:#0A1F1A}
.lbl{font-size:10px;font-weight:800;color:#0A1F1A;font-family:'JetBrains Mono',monospace}
.caption{font-size:10px;color:#8B8680}
.xs{height:64px;border-radius:4px}
.sm{height:64px;border-radius:8px}
.md{height:64px;border-radius:14px}
.lg{height:64px;border-radius:20px}
.xl{height:64px;border-radius:24px}
.pill{height:64px;border-radius:999px;width:80%}
</style></head><body>
  <div class="r"><div class="swatch xs"></div><div class="lbl">4</div><div class="caption">xs · digit cells</div></div>
  <div class="r"><div class="swatch sm"></div><div class="lbl">8</div><div class="caption">sm · chips, inputs</div></div>
  <div class="r"><div class="swatch md"></div><div class="lbl">14</div><div class="caption">default · cards, CTAs</div></div>
  <div class="r"><div class="swatch lg"></div><div class="lbl">20</div><div class="caption">lg · hero, vault</div></div>
  <div class="r"><div class="swatch xl"></div><div class="lbl">24</div><div class="caption">xl · collars, modals</div></div>
  <div class="r"><div class="swatch pill"></div><div class="lbl">999</div><div class="caption">pill · badges, tabs</div></div>
</body></html>
