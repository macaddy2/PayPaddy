<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
body{width:700px;background:#0A1F1A;padding:24px;display:flex;flex-direction:column;gap:10px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(255,255,255,.08);color:#FAF7F2;border:1px solid rgba(255,255,255,.1)}
.trinity{padding:4px 10px;border-radius:999px;background:#BFFF4F;color:#0A1F1A;font-size:10px;font-weight:800;letter-spacing:.3px}
.gold{padding:4px 10px;border-radius:999px;background:linear-gradient(135deg,#F5A623,#FFD36E);color:#0A1F1A;font-size:10px;font-weight:800}
.silver{padding:4px 10px;border-radius:999px;background:#E0E0E0;color:#0A1F1A;font-size:10px;font-weight:800}
.status{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700}
.popular{padding:2px 8px;border-radius:999px;background:#BFFF4F;color:#0A1F1A;font-size:9px;font-weight:800}
</style></head><body>
  <div class="pills"><span class="pill">✓ CBN Licensed</span><span class="pill">✓ NDIC Insured</span><span class="pill">✓ NDPR</span></div>
  <div class="pills"><span class="trinity">TRINITY ✓</span><span class="gold">GOLD</span><span class="silver">SILVER</span><span class="popular">POPULAR</span></div>
  <div class="pills"><span class="status" style="background:rgba(0,168,107,.2);color:#BFFF4F">Funded</span><span class="status" style="background:rgba(245,166,35,.2);color:#F5A623">Seller Shipping</span><span class="status" style="background:rgba(61,127,255,.2);color:#6C9FFF">Match in 4h</span><span class="status" style="background:rgba(233,75,60,.2);color:#FF8A7A">Dispute</span></div>
</body></html>
