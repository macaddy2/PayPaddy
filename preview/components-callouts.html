<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
body{width:700px;background:#FAF7F2;padding:24px;display:flex;flex-direction:column;gap:12px}
.tile{background:#FFF;border-radius:14px;padding:14px;display:flex;gap:10px;align-items:center}
.emerald-bg{background:rgba(0,168,107,.08);border:1px solid rgba(0,168,107,.2)}
.coral-bg{background:rgba(255,107,74,.08);border:1px solid rgba(255,107,74,.2)}
.ink-bg{background:#0A1F1A;color:#FAF7F2}
.icon{font-size:18px}
.text{flex:1;font-size:12px;line-height:1.5;color:#0A4634;font-weight:600}
.coral-bg .text{color:#B04020}
.ink-bg .text{color:#FAF7F2}
.strong{font-weight:800;color:#0A1F1A}
.ink-bg .strong{color:#BFFF4F}
</style></head><body>
  <div class="tile emerald-bg"><span class="icon">🛡️</span><div class="text"><span class="strong">Your ₦1,250,000 is safe.</span> Funds stay locked till we investigate. Average resolution: 24 hours.</div></div>
  <div class="tile coral-bg"><span class="icon">⚠️</span><div class="text"><span class="strong">Action needed.</span> TechHub CV hasn't responded in 48h. Want to escalate?</div></div>
  <div class="tile ink-bg"><span class="icon">✨</span><div class="text"><span class="strong">SUGGESTED</span><br>Continue MacBook deal draft?</div></div>
</body></html>
