<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
body{width:700px;background:#FAF7F2;padding:24px;display:flex;flex-direction:column;gap:12px}
button{border:none;cursor:pointer;font-family:inherit}
.primary{background:#BFFF4F;color:#0A1F1A;padding:18px;border-radius:14px;font-size:15px;font-weight:900;letter-spacing:-.3px;width:100%}
.dark{background:#0A1F1A;color:#FAF7F2;padding:18px;border-radius:14px;font-size:14px;font-weight:800;width:100%;box-shadow:0 8px 24px rgba(10,31,26,.30)}
.emerald{background:#00A86B;color:#fff;padding:16px;border-radius:14px;font-size:14px;font-weight:800;width:100%}
.row{display:flex;gap:8px}
.secondary{background:#FAF7F2;color:#0A1F1A;border:1.5px solid #F0EBE1;padding:14px;border-radius:14px;font-size:13px;font-weight:700;flex:1}
.ghost{background:transparent;color:#E94B3C;padding:10px;font-size:12px;font-weight:700;width:100%}
</style></head><body>
  <button class="primary">Create Account</button>
  <button class="dark">+ Start a New Deal</button>
  <button class="emerald">✓ I got the item</button>
  <div class="row"><button class="secondary">Join Deal</button><button class="secondary">Quick Pay</button><button class="secondary">My Paddys</button></div>
  <button class="ghost">⚠ Report a problem</button>
</body></html>
