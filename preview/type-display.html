<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
body{width:700px;background:#FAF7F2;padding:24px;color:#0A1F1A}
.row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid #F0EBE1}
.row:last-child{border-bottom:none}
.meta{width:100px;flex-shrink:0;font-size:10px;color:#8B8680;font-family:'JetBrains Mono',monospace}
.specimen{flex:1;color:#0A1F1A}
.d1{font-size:40px;font-weight:900;letter-spacing:-1.5px;line-height:1.05}
.d2{font-size:36px;font-weight:900;letter-spacing:-1px;line-height:1.1}
.h1{font-size:26px;font-weight:900;letter-spacing:-.8px}
.h2{font-size:22px;font-weight:800;letter-spacing:-.5px}
.h3{font-size:18px;font-weight:800;letter-spacing:-.3px}
</style></head><body>
  <div class="row"><div class="meta">Display 1 · 40/900</div><div class="specimen d1">No wahala.</div></div>
  <div class="row"><div class="meta">Display 2 · 36/900</div><div class="specimen d2">Your money is safe.</div></div>
  <div class="row"><div class="meta">H1 · 26/900</div><div class="specimen h1">One quick verification left</div></div>
  <div class="row"><div class="meta">H2 · 22/800</div><div class="specimen h2">Money no go waka.</div></div>
  <div class="row"><div class="meta">H3 · 18/800</div><div class="specimen h3">MacBook Pro Purchase</div></div>
</body></html>
