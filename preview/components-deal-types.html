<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;font-family:'Manrope',sans-serif}
body{width:700px;background:#FAF7F2;padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-item{background:#FFF;border:1.5px solid #F0EBE1;border-radius:16px;padding:16px;position:relative;min-height:110px}
.popular{position:absolute;top:10px;right:10px;background:#BFFF4F;color:#0A1F1A;padding:2px 8px;border-radius:999px;font-size:9px;font-weight:800}
.icon{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:20px;margin-bottom:10px}
.title{font-size:14px;font-weight:800;color:#0A1F1A;margin-bottom:2px}
.desc{font-size:11px;color:#8B8680}
</style></head><body>
  <div class="grid-item">
    <span class="popular">POPULAR</span>
    <div class="icon" style="background:rgba(0,168,107,.15)">🛍</div>
    <div class="title">Buy / Sell</div>
    <div class="desc">Products & goods</div>
  </div>
  <div class="grid-item">
    <div class="icon" style="background:rgba(61,127,255,.15)">🔧</div>
    <div class="title">Service</div>
    <div class="desc">Freelance work</div>
  </div>
  <div class="grid-item">
    <div class="icon" style="background:rgba(255,157,110,.15)">📑</div>
    <div class="title">Contract</div>
    <div class="desc">Milestones</div>
  </div>
  <div class="grid-item">
    <div class="icon" style="background:rgba(245,166,35,.15)">🎲</div>
    <div class="title">Bet / Wager</div>
    <div class="desc">Predictions</div>
  </div>
</body></html>
