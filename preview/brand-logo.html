<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:700px;height:220px;background:#0A1F1A;display:flex;align-items:center;justify-content:center;gap:36px;font-family:'Manrope',sans-serif}
.mark-wrap{width:120px;height:120px;display:grid;place-items:center}
.tile{width:120px;height:120px;border-radius:28px;background:#BFFF4F;transform:rotate(-8deg);display:grid;place-items:center;box-shadow:0 20px 40px rgba(0,0,0,.35)}
.lock{width:56px;height:56px;position:relative;transform:rotate(8deg)}
.shackle{position:absolute;top:0;left:14px;width:28px;height:24px;border:6px solid #0A1F1A;border-radius:14px 14px 0 0;border-bottom:none}
.body{position:absolute;bottom:0;left:4px;width:48px;height:32px;background:#0A1F1A;border-radius:6px;display:grid;place-items:center}
.key{width:6px;height:12px;background:#BFFF4F;border-radius:3px;margin-top:-2px}
.word{color:#FAF7F2;font-weight:900;font-size:64px;letter-spacing:-2.5px;line-height:1}
.tag{color:#BFFF4F;font-size:14px;font-weight:700;letter-spacing:0.5px;margin-top:6px}
</style></head><body>
  <div class="mark-wrap"><div class="tile"><div class="lock"><div class="shackle"></div><div class="body"><div class="key"></div></div></div></div></div>
  <div><div class="word">PayPaddy</div><div class="tag">NO WAHALA · YOUR MONEY IS SAFE</div></div>
</body></html>
